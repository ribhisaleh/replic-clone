<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Video Message</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── BACKGROUND IFRAME ── */
    #site-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    #site-iframe {
      width: 100%;
      height: calc(100vh + 1400px);
      border: none;
      display: block;
      transform: translateY(0px);
      will-change: transform;
      pointer-events: none;
    }

    #site-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.15);
      pointer-events: none;
    }

    /* ── TOP BAR ── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      padding: 16px 22px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeInDown 0.6s ease forwards;
    }

    #rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
      box-shadow: 0 0 8px #ff4444;
      animation: recPulse 1.2s ease-in-out infinite;
    }

    #greeting {
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6);
      flex: 1;
    }

    #greeting .name { color: #60d4ff; }
    #greeting .company { color: #a8ff78; }
    #greeting .sub { color: rgba(255,255,255,0.65); font-weight: 400; }

    #site-badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 5px 13px;
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    #site-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      animation: greenPulse 2s ease-in-out infinite;
    }

    /* ── VIDEO BUBBLE ── */
    #video-wrap {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      animation: slideUpIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
    }

    #video-bubble {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.92);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 60px rgba(96,212,255,0.15);
      background: #111;
      position: relative;
    }

    #video-bubble iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #name-tag {
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 7px 16px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-left: 14px;
    }

    #name-tag strong { color: #60d4ff; }

    /* ── SCROLL INDICATOR ── */
    #scroll-indicator {
      position: fixed;
      bottom: 28px;
      right: 24px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 7px 16px;
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      transition: opacity 0.5s ease;
      animation: fadeInUp 0.5s ease 1s both;
    }

    #scroll-indicator .arrow {
      animation: bounce 1s ease-in-out infinite;
      display: inline-block;
    }

    #scroll-indicator.hidden { opacity: 0; pointer-events: none; }

    /* ── IFRAME BLOCKED FALLBACK ── */
    #blocked-fallback {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: white;
      text-align: center;
    }

    #blocked-fallback.show { display: flex; }
    #blocked-fallback h2 { font-size: 20px; font-weight: 600; }
    #blocked-fallback p { color: rgba(255,255,255,0.5); font-size: 14px; }
    #blocked-fallback .site-url {
      color: #60d4ff;
      font-size: 13px;
      background: rgba(96,212,255,0.1);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(96,212,255,0.2);
      max-width: 400px;
      word-break: break-all;
    }

    /* ── ANIMATIONS ── */
    @keyframes recPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    @keyframes greenPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUpIn {
      from { opacity: 0; transform: translateY(40px) scale(0.85); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

  <!-- Background: Lead's site -->
  <div id="site-container">
    <iframe id="site-iframe" src="" sandbox="allow-scripts allow-same-origin allow-forms" title="Lead website"></iframe>
    <div id="site-overlay"></div>
    <!-- Fallback if iframe is blocked -->
    <div id="blocked-fallback">
      <div style="font-size:40px">🌐</div>
      <h2>Website Preview</h2>
      <p>Recorded this message specifically for your team at</p>
      <div class="site-url" id="fallback-url"></div>
    </div>
  </div>

  <!-- Top bar greeting -->
  <div id="top-bar">
    <div id="rec-dot"></div>
    <div id="greeting">
      Hey <span class="name" id="name-display">there</span>
      <span class="sub" id="company-display"></span>
    </div>
    <div id="site-badge">
      <span class="dot"></span>
      <span id="site-label">loading...</span>
    </div>
  </div>

  <!-- Video bubble bottom-left -->
  <div id="video-wrap">
    <div id="video-bubble">
      <iframe
        id="video-iframe"
        src="https://drive.google.com/file/d/1UQkAzQQGgXmdmbVug6YffYHABV3gTlgc/preview"
        allow="autoplay"
        allowfullscreen
      ></iframe>
    </div>
    <div id="name-tag">🎥 Personal message for <strong id="name-tag-name">you</strong></div>
  </div>

  <!-- Scroll indicator -->
  <div id="scroll-indicator">
    <span class="arrow">↓</span>
    <span id="scroll-label">Browsing...</span>
  </div>

  <script>
    (function() {
      // ── Parse URL params ──
      const params = new URLSearchParams(window.location.search);
      const to   = params.get('to')   || 'there';
      const co   = params.get('co')   || '';
      const site = params.get('site') || 'https://www.upwork.com';

      // ── Set personalization ──
      document.getElementById('name-display').textContent = to;
      document.getElementById('name-tag-name').textContent = to;

      if (co) {
        document.getElementById('company-display').innerHTML =
          ` &mdash; recorded this for <span class="company">${co}</span>`;
      }

      const siteLabel = site.replace(/https?:\/\/(www\.)?/, '').split('/')[0];
      document.getElementById('site-label').textContent = siteLabel;
      document.getElementById('scroll-label').textContent = 'Browsing ' + siteLabel;
      document.getElementById('fallback-url').textContent = site;

      // ── Load iframe ──
      const iframe = document.getElementById('site-iframe');
      iframe.src = site;

      // Detect if iframe was blocked (X-Frame-Options)
      iframe.addEventListener('load', function() {
        try {
          // If we can access contentDocument, it loaded
          const doc = iframe.contentDocument || iframe.contentWindow.document;
          if (!doc || doc.URL === 'about:blank') throw new Error('blocked');
        } catch(e) {
          // Cross-origin = blocked by X-Frame-Options — show fallback
          document.getElementById('blocked-fallback').classList.add('show');
        }
      });

      // ── Scroll Animation (9 seconds) ──
      const SCROLL_DURATION = 9000;
      const MAX_TRANSLATE = 1300; // px
      let startTime = null;
      let animFrame;

      function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      }

      function animateScroll(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / SCROLL_DURATION, 1);
        const eased = easeInOut(progress);
        const translateY = -(eased * MAX_TRANSLATE);

        iframe.style.transform = 'translateY(' + translateY + 'px)';

        if (progress < 1) {
          animFrame = requestAnimationFrame(animateScroll);
        } else {
          // Scroll done — hide indicator
          document.getElementById('scroll-indicator').classList.add('hidden');
        }
      }

      // Start scroll after 1.2s (let page render)
      setTimeout(function() {
        animFrame = requestAnimationFrame(animateScroll);
      }, 1200);

      // ── Page title ──
      document.title = co
        ? 'Message for ' + to + ' @ ' + co
        : 'Personal message for ' + to;

    })();
  </script>

</body>
</html>
